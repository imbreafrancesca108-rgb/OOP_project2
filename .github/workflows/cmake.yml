name: CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    # ── LINUX CONFIG ──────────────────────────────────────────────────────────
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++-13 libxrandr-dev libxcursor-dev libudev-dev libopenal-dev libvorbis-dev libflac-dev libgl1-mesa-dev libegl1-mesa-dev libdrm-dev libgbm-dev
        
    - name: Cache SFML 3 (Linux)
      if: matrix.os == 'ubuntu-latest'
      id: cache-sfml
      uses: actions/cache@v4
      with:
        path: ./sfml3_install
        key: ${{ matrix.os }}-sfml3-v1

    - name: Build SFML 3 from Source (Linux)
      if: matrix.os == 'ubuntu-latest' && steps.cache-sfml.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
        cmake -S SFML -B SFML/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=./sfml3_install -DSFML_BUILD_AUDIO=ON -DSFML_BUILD_GRAPHICS=ON -DSFML_BUILD_WINDOW=ON -DSFML_BUILD_SYSTEM=ON
        cmake --build SFML/build --target install --parallel $(nproc)

    # ── WINDOWS CONFIG (Aliniat pe MINGW64) ───────────────────────────────────
    - name: Set up MSYS2 (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-sfml

    # ── BUILD STEPS ──────────────────────────────────────────────────────────
    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sfml3_install" -DCMAKE_CXX_COMPILER=g++-13

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

    - name: Build Project (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cmake --build build --config Debug

    - name: Build Project (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: cmake --build build --config Debug
